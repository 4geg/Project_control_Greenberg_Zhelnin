{% extends 'core/base.html' %}

{% block content %}
<h1>{{ title }}</h1>

<p>Проект: <strong>{{ project.name }}</strong></p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn">Сохранить</button>
    <a href="{% url 'project_detail' project.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
