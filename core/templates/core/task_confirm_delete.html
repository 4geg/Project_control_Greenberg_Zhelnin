{% extends 'core/base.html' %}

{% block content %}
<h1>Удаление задачи</h1>

<p>Вы действительно хотите удалить задачу <strong>{{ task.title }}</strong>?</p>

<form method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'project_detail' task.project.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
