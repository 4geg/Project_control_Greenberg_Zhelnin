<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления проектами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #263238;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 16px;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-danger {
            background: #c62828;
        }

        .btn-secondary {
            background: #607d8b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #eceff1;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 14px;
            box-sizing: border-box;
        }

        .actions {
            margin-top: 20px;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>
<body>
<header>
    <div>
        <a href="{% url 'project_list' %}">Система управления проектами</a>
    </div>

    <div>
        {% if user.is_authenticated %}
            Пользователь: {{ user.username }}

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-secondary">Выйти</button>
            </form>
        {% endif %}
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
